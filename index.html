<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive — Real Estate & Finance Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* ── 흑백 뉴트럴 (살짝 쿨톤) ── */
    --bg: #f1f2f2;
    --bg-card: #f6f6f5;
    --bg-left: #161718;
    --ink: #18191a;
    --ink-light: #66686b;
    --ink-faint: #a9abad;
    --rule: #d8d9d8;
    --rule-soft: #e4e4e3;
    /* ── 포인트 컬러 1개 (절제된 슬레이트 블루) ── */
    --accent: oklch(0.56 0.05 248);
    --accent-bright: oklch(0.64 0.07 248);
    --accent-soft: oklch(0.56 0.05 248 / 0.10);
    /* ── 다크 패널 위 텍스트 ── */
    --on-dark: #ededec;
    --on-dark-dim: rgba(237,237,236,0.52);
    --on-dark-faint: rgba(237,237,236,0.30);
    --left-w: 40%;
    /* ── 타입: 산세리프 / 고딕 (간결하게) ── */
    --font-sans: 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 15px; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-weight: 400;
    min-height: 100vh;
    word-break: keep-all;
    overflow-wrap: break-word;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: var(--accent); color: #fff; }

  /* ── LAYOUT ── */
  .site-wrap { display: flex; min-height: 100vh; }

  /* ── LEFT PANEL ── */
  .left-panel {
    position: sticky;
    top: 0;
    width: var(--left-w);
    height: 100vh;
    background: var(--bg-left);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .left-top {
    flex: 0 0 auto;
    padding: 3.2rem 3rem 2.4rem;
    position: relative;
    z-index: 2;
  }

  .left-top::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 39px,
      rgba(255,255,255,0.022) 39px, rgba(255,255,255,0.022) 40px);
    pointer-events: none;
  }

  .site-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.26em;
    color: var(--accent-bright);
    text-transform: uppercase;
    margin-bottom: 2.6rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }
  .site-eyebrow::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--on-dark-faint), transparent);
  }

  .site-title {
    font-family: var(--font-sans);
    font-size: 2.25rem;
    font-weight: 500;
    line-height: 1.32;
    color: var(--on-dark);
    letter-spacing: -0.02em;
  }

  .site-rule {
    width: 2.4rem;
    height: 1px;
    background: var(--on-dark-dim);
    margin: 1.7rem 0;
  }

  .site-desc {
    font-family: var(--font-sans);
    font-size: 0.8rem;
    font-weight: 400;
    line-height: 1.95;
    color: var(--on-dark-dim);
    max-width: 21rem;
    word-break: keep-all;
  }

  /* 하단 이미지 — 영역 확대 */
  .left-image {
    flex: 1 1 auto;
    position: relative;
    min-height: 0;
  }
  .left-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 55%;
    display: block;
    filter: saturate(1.04) brightness(0.92);
  }
  .left-image::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 140px;
    background: linear-gradient(to bottom, var(--bg-left) 0%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }
  /* 이미지 위 캡션(크레딧/장소) */
  .left-image-cap {
    position: absolute;
    left: 3rem;
    bottom: 1.6rem;
    z-index: 2;
    font-family: var(--font-mono);
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--on-dark-faint);
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    flex: 1;
    padding: 3.2rem 3.6rem 5rem 3.6rem;
    min-width: 0;
    max-width: 760px;
  }

  /* ── MASTHEAD STATS ── */
  .masthead {
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    gap: 1.5rem;
    padding-bottom: 1.1rem;
    margin-bottom: 1.8rem;
    border-bottom: 1px solid var(--ink);
    flex-wrap: wrap;
  }
  .stat-group { display: flex; align-items: baseline; gap: 1.7rem; }
  .stat { display: flex; flex-direction: column; gap: 0.42rem; }
  .stat-num {
    font-family: var(--font-sans);
    font-size: 1.5rem;
    font-weight: 600;
    line-height: 1;
    color: var(--ink);
    font-feature-settings: "tnum";
    letter-spacing: -0.01em;
  }
  .stat-num em { font-style: normal; color: var(--accent); }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 0.55rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-light);
  }
  .stat-div { width: 1px; align-self: stretch; background: var(--rule); margin: 0.1rem 0; }
  .masthead-meta {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-align: right;
    line-height: 1.7;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin-bottom: 2.6rem;
    flex-wrap: wrap;
  }
  .search-wrap { flex: 1 1 200px; min-width: 170px; position: relative; }
  .search-icon {
    position: absolute; left: 0.85rem; top: 50%;
    transform: translateY(-50%);
    width: 13px; height: 13px; opacity: 0.4;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 0.62rem 0.9rem 0.62rem 2.25rem;
    border: 1px solid var(--rule);
    background: var(--bg-card);
    font-family: var(--font-sans);
    font-size: 0.78rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    border-radius: 0;
  }
  .search-input::placeholder { color: var(--ink-faint); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .filter-btns { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .filter-btn {
    padding: 0.5rem 0.85rem;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.16s;
    border-radius: 0;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--ink-light); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  /* 정렬 토글 */
  .sort-btn {
    display: flex; align-items: center; gap: 0.45rem;
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.16s;
    white-space: nowrap;
  }
  .sort-btn:hover { border-color: var(--ink-light); color: var(--ink); }
  .sort-btn svg { width: 11px; height: 11px; transition: transform 0.2s; }
  .sort-btn.oldest svg { transform: rotate(180deg); }

  /* ── SECTION HEADERS ── */
  .section-block { margin-bottom: 2.8rem; }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 0.9rem;
    margin-bottom: 0.3rem;
    padding-bottom: 0.55rem;
    border-bottom: 1px solid var(--rule);
  }
  .section-index {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .section-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 500;
  }
  .section-sub {
    font-family: var(--font-sans);
    font-size: 0.72rem;
    color: var(--ink-faint);
  }
  .section-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  /* ── REPORT ITEM ── */
  .report-list { display: flex; flex-direction: column; }
  .report-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0 1.2rem;
    align-items: start;
    padding: 1.05rem 0.4rem;
    margin: 0 -0.4rem;
    border-bottom: 1px solid var(--rule-soft);
    text-decoration: none;
    color: inherit;
    transition: background 0.16s, padding 0.16s;
    position: relative;
  }
  .report-item::before {
    content: '';
    position: absolute;
    left: 0; top: -1px; bottom: -1px;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 0.2s ease;
  }
  .report-item:hover {
    background: var(--bg-card);
    padding-left: 0.9rem;
  }
  .report-item:hover::before { transform: scaleY(1); }
  .report-item:hover .report-arrow { opacity: 1; transform: translateX(2px); }
  .report-item:hover .report-title { color: var(--accent); }

  .report-num {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--ink-faint);
    padding-top: 0.3rem;
    letter-spacing: 0.05em;
  }
  .report-topic {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }
  .report-title {
    font-family: var(--font-sans);
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 0.32rem;
    transition: color 0.16s;
    text-wrap: pretty;
  }
  .report-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }
  .report-date {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }
  .tag {
    font-family: var(--font-mono);
    font-size: 0.54rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.16rem 0.5rem;
    border: 1px solid var(--rule);
    color: var(--ink-light);
    border-radius: 0;
  }
  .report-arrow {
    font-size: 0.8rem;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.16s, transform 0.16s;
    align-self: center;
  }

  /* ── ALL 뷰: 카테고리별 고정 높이 + 내부 스크롤 ── */
  .list-window { position: relative; }
  .report-list.capped {
    max-height: 19rem;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0 0.6rem;
    margin: 0 -0.6rem;
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
    overscroll-behavior: contain;
  }
  .report-list.capped::-webkit-scrollbar { width: 6px; }
  .report-list.capped::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
  .report-list.capped::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
  .report-list.capped::-webkit-scrollbar-track { background: transparent; }
  .list-window.capped-win::before,
  .list-window.capped-win::after {
    content: '';
    position: absolute; left: 0; right: 0;
    height: 1.8rem; pointer-events: none;
    opacity: 0; transition: opacity 0.2s; z-index: 2;
  }
  .list-window.capped-win::before { top: 0; background: linear-gradient(var(--bg), transparent); }
  .list-window.capped-win::after  { bottom: 0; background: linear-gradient(transparent, var(--bg)); }
  .list-window.can-up::before { opacity: 1; }
  .list-window.can-down::after { opacity: 1; }

  /* ── UPCOMING ── */
  .upcoming-wrap { margin-top: 0.7rem; }
  .upcoming-label {
    font-family: var(--font-mono);
    font-size: 0.54rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0.3rem;
  }
  .upcoming-item {
    padding: 0.7rem 0.4rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0 1.2rem;
    align-items: baseline;
  }
  .upcoming-num {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--ink-faint);
  }
  .upcoming-title {
    font-size: 0.84rem;
    color: var(--ink-faint);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .upcoming-badge {
    font-family: var(--font-mono);
    font-size: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border: 1px dashed var(--rule);
    padding: 0.1rem 0.4rem;
    align-self: center;
    white-space: nowrap;
  }

  /* ── EMPTY ── */
  .empty-state {
    padding: 3rem 0;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    text-align: center;
  }
  .empty-state span { display: block; margin-top: 0.6rem; font-size: 0.62rem; opacity: 0.7; }

  /* ── FOOTER ── */
  .archive-foot {
    margin-top: 3.5rem;
    padding-top: 1.4rem;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    font-family: var(--font-mono);
    font-size: 0.56rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ── MOBILE ── */
  @media (max-width: 820px) {
    .site-wrap { flex-direction: column; }
    .left-panel { position: static; width: 100%; height: auto; }
    .left-top { padding: 2.4rem 1.7rem 1.8rem; }
    .left-image { height: 240px; }
    .left-image-cap { left: 1.7rem; }
    .site-title { font-size: 2.1rem; }
    .right-panel { padding: 2.1rem 1.5rem 3.5rem; max-width: none; }
    .masthead { flex-direction: column; align-items: flex-end; }
    .masthead-meta { text-align: left; }
    .stat-group { gap: 1.3rem; }
    .report-item, .upcoming-item { grid-template-columns: 1fr auto; }
  }
  @media (max-width: 460px) {
    .stat-group { flex-wrap: wrap; gap: 0.9rem 1.3rem; }
    .stat-div { display: none; }
  }

  /* ── ENTRANCE (인쇄·캡처·reduced-motion 에서는 그냥 보이도록) ── */
  @media (prefers-reduced-motion: no-preference) {
    .anim-in { opacity: 0; animation: fadeUp 0.45s cubic-bezier(0.2,0.7,0.2,1) both; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(9px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<div class="site-wrap">

  <!-- ═══════════════ LEFT PANEL ═══════════════ -->
  <aside class="left-panel">
    <div class="left-top">
      <div class="site-eyebrow">RE &amp; Infra Report Archive</div>
      <h1 class="site-title">SRC Plus</h1>

      <div class="filter-btns">

    <!-- Dynamic list -->

  // ── ISSUES ──
  { cat: 'issues', topic: "에셋라이트 (1)", title: "Cap Rate가 아니라 NOI를 봐야할 때", date: '2026-06', author: 'sjahn', n: 1, href: 'reports/issues_asset-lite-1_260624_sjahn.html', published: true },
  { cat: 'issues', topic: "에셋라이트 (2)", title: "소유와 임차의 선택 — 케이스 스터디", date: '2026-06', author: 'sjahn', n: 2, href: 'reports/issues_asset-lite-2_260624_sjahn.html', published: true },
  { cat: 'issues', topic: "2026 북중미 월드컵과 인프라 금융", title: "월드컵 개최 모델은 어떻게 분산되고 있는가", date: '2025-06', author: 'jbchoi', n: 3, href: 'reports/issues_worldcup-infra_250624_jbchoi.html', published: true },
  // ── SECTORS ──
  { cat: 'sectors', topic: "공유수면매립사업", title: "공공의 바다를 누군가의 땅으로", date: '2025-06', author: 'jbchoi', n: 1, href: 'reports/sectors_land-reclamation_250624_jbchoi.html', published: true },
];

const CAT_META = {
  insights: { label: 'Insights', sub: '개념·구조 해설' },
  issues:   { label: 'Issues',   sub: '시장·정책·딜 이슈' },
  sectors:  { label: 'Sectors',  sub: '자산군·산업군 정리' },
};
const CAT_ORDER = ['insights', 'issues', 'sectors'];

let currentFilter = 'all';
let sortOrder = 'newest'; // 'newest' | 'oldest'

function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ── Masthead 통계 (필터/검색과 무관한 전체 통계) ── */
function renderStats() {
  const pub = REPORTS.filter(r => r.published);
  const total = pub.length;
  const byCat = CAT_ORDER.map(c => ({ c, n: pub.filter(r => r.cat === c).length }));
  const upcoming = REPORTS.filter(r => r.upcoming).length;

  let html = `
    <div class="stat">
      <span class="stat-num"><em>${String(total).padStart(2,'0')}</em></span>
      <span class="stat-label">게시된 글</span>
    </div>
    <div class="stat-div"></div>`;
  byCat.forEach(({c, n}) => {
    html += `
    <div class="stat">
      <span class="stat-num">${String(n).padStart(2,'0')}</span>
      <span class="stat-label">${CAT_META[c].label}</span>
    </div>`;
  });
  document.getElementById('stat-group').innerHTML = html;
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderAll();
}

function toggleSort() {
  sortOrder = sortOrder === 'newest' ? 'oldest' : 'newest';
  const btn = document.getElementById('sortBtn');
  btn.classList.toggle('oldest', sortOrder === 'oldest');
  document.getElementById('sortLabel').textContent = sortOrder === 'newest' ? '최신순' : '오래된순';
  renderAll();
}

function initCapped() {
  document.querySelectorAll('.report-list.capped').forEach(list => {
    const win = list.closest('.list-window');
    const update = () => {
      const over = list.scrollHeight - list.clientHeight;
      win.classList.toggle('can-up', list.scrollTop > 2);
      win.classList.toggle('can-down', over > 2 && list.scrollTop < over - 2);
    };
    list.addEventListener('scroll', update, { passive: true });
    update();
  });
}

function renderAll() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const root  = document.getElementById('archive-root');
  const cats  = currentFilter === 'all' ? CAT_ORDER : [currentFilter];
  const capped = currentFilter === 'all' && !query;

  const sortFn = (a, b) => {
    const cmp = (a.date || '').localeCompare(b.date || '');
    return sortOrder === 'newest' ? -cmp || (b.n - a.n) : cmp || (a.n - b.n);
  };

  let html = '';
  let anyVisible = false;
  let shownCount = 0;
  let secIdx = 0;

  cats.forEach(cat => {
    const published = REPORTS.filter(r =>
      r.cat === cat && r.published &&
      (!query || r.title.toLowerCase().includes(query) || (r.topic || '').toLowerCase().includes(query))
    ).sort(sortFn);
    const upcoming = REPORTS.filter(r =>
      r.cat === cat && r.upcoming &&
      (!query || r.title.toLowerCase().includes(query) || (r.topic || '').toLowerCase().includes(query))
    );

    if (published.length === 0 && upcoming.length === 0) return;
    anyVisible = true;
    shownCount += published.length;
    secIdx++;

    html += `
      <section class="section-block">
        <div class="section-head">
          <span class="section-label">${CAT_META[cat].label}</span>
          <span class="section-sub">${CAT_META[cat].sub}</span>
          <span class="section-count">${published.length}편</span>
        </div>
        <div class="list-window${capped ? ' capped-win' : ''}">
        <div class="report-list${capped ? ' capped' : ''}">`;

    published.forEach((r, idx) => {
      html += `
        <a class="report-item anim-in" href="${esc(r.href)}" style="animation-delay:${idx * 0.04}s">
          <div class="report-body">
            ${r.topic ? `<div class="report-topic">${esc(r.topic)}</div>` : ''}
            <div class="report-title">${esc(r.title)}</div>
            <div class="report-meta">
              <span class="report-date">${esc(r.date)}</span>
              <span class="tag">${CAT_META[cat].label}</span>
            </div>
          </div>
          <div class="report-arrow">→</div>
        </a>`;
    });
    html += `</div></div>`;

    if (upcoming.length > 0 && !query) {
      html += `<div class="upcoming-wrap"><div class="upcoming-label">작성 예정</div>`;
      upcoming.forEach(r => {
        html += `
          <div class="upcoming-item">
            <div class="upcoming-title">${esc(r.title)}</div>
            <div class="upcoming-badge">Soon</div>
          </div>`;
      });
      html += `</div>`;
    }
    html += `</section>`;
  });

  if (!anyVisible) {
    html = `<div class="empty-state">검색 결과가 없습니다<span>"${esc(query)}" 와 일치하는 글이 없어요</span></div>`;
  }

  root.innerHTML = html;
  initCapped();
  document.getElementById('foot-count').textContent =
    query ? `${shownCount} results for "${query}"` : `Showing ${shownCount} of ${REPORTS.filter(r=>r.published).length}`;
}

renderStats();
renderAll();
</script>
</body>
</html>
