name: Build Index

on:
  push:
    branches:
      - main
    # 경로 필터를 두지 않고 main에 대한 모든 push에서 실행한다.
    # reports_*.html 추가/수정/삭제뿐 아니라 index.html 수동 편집 등으로
    # 목록이 실제 파일과 어긋나는 경우까지 매번 스캔해 재동기화하기 위함.
    # build.py는 저장소를 스캔만 하므로 매번 실행해도 비용이 낮다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build script
        run: python build.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: auto-update index.html [skip ci]"
          git push
